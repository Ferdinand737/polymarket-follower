name: polymarket-swarm

services:
  # ============================================================
  # Polymarket Follower Bot - Multi-Instance Docker Compose
  # ============================================================
  # Auto-generated by polybot CLI. Do not edit manually.
  # Use: python cli/polybot.py add/remove to manage bots.
  # ============================================================

  justdance:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    container_name: polybot-justdance
    restart: always
    env_file:
      - .env
      - bots/justdance/.env
    volumes:
      - justdance-config:/app/config
      - justdance-logs:/app/logs
    environment:
      - FOLLOWER_CHECK_INTERVAL_MINUTES=5

volumes:
  justdance-config:
  justdance-logs:
